name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: go checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.12"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Check formatting
        run: test -z "$(find . -name '*.go' -not -path './vendor/*' -print0 | xargs -0 gofmt -l)"

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Race test
        run: go test -race ./...

      - name: Govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.12"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.0

  integration:
    name: postgres integration
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.12"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run PostgreSQL integration tests
        run: go test -tags=integration ./...

  docker:
    name: docker build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build image
        run: docker build --pull -t cryptopulse-telegram-bot-ci .

  secrets:
    name: secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan complete Git history
        uses: docker://ghcr.io/gitleaks/gitleaks:v8.24.3
        with:
          args: git --redact --verbose --log-opts=--all .
        env:
          GIT_CONFIG_COUNT: "1"
          GIT_CONFIG_KEY_0: safe.directory
          GIT_CONFIG_VALUE_0: /github/workspace
